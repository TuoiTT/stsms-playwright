name: 🧪 STSMS Login Test - Tự động chạy

on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Chọn nhóm test'
        required: true
        default: 'login-tests'
        type: choice
        options:
          - login-tests
          - authenticated-tests
          - all

  schedule:
    - cron: '0 1 * * 1-5'  # 8:00 SA, Thứ 2 - Thứ 6

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Cài dependencies
        run: npm install

      - name: 🌐 Cài Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 📁 Tạo thư mục .auth
        run: mkdir -p .auth

      - name: 🧪 Chạy Tests
        run: |
          SCOPE="${{ github.event.inputs.test_scope }}"
          if [ -z "$SCOPE" ] || [ "$SCOPE" = "all" ]; then
            npx playwright test
          else
            npx playwright test --project=setup --project=$SCOPE
          fi
        env:
          BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASS: ${{ secrets.BASIC_AUTH_PASS }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: 📊 Upload báo cáo HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: 📋 Upload kết quả XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30
